<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MMM Pocket Lite</title>
<style>
:root{
  --bg:#060910;
  --line:rgba(104,228,255,.18);
  --cyan:#38e6ff;
  --yellow:#ffe45e;
  --text:#f7fbff;
  --sub:#9fb0c4;
  --danger:#ff5b6d;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",system-ui,sans-serif;-webkit-text-size-adjust:100%}
body{overflow:hidden}
button,input,textarea{font:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
input,textarea,select{font-size:16px}
button{cursor:pointer}
.app{height:100dvh;display:grid;grid-template-rows:auto 1fr auto;background:linear-gradient(180deg,#08111b,#05070b)}
.header{padding:8px 10px 7px;border-bottom:1px solid rgba(104,228,255,.12);background:rgba(7,10,16,.94)}
.title{width:100%;min-height:34px;border:0;border-radius:10px;padding:6px 4px;background:transparent;color:var(--text);font-size:17px;font-weight:900;outline:none}
.title:focus{outline:1px solid rgba(56,230,255,.16)}
.main{min-height:0;overflow:auto;-webkit-overflow-scrolling:touch;padding:8px 10px 154px}
.mode-head{display:flex;justify-content:space-between;gap:8px;align-items:center;margin:0 0 7px}
.mode-title{font-size:16px;font-weight:950;line-height:1.2}
.mode-count{color:rgba(159,176,196,.72);font-size:11px;font-weight:850}
.mode-meta{display:flex;align-items:center;gap:6px}
.head-select{min-height:30px;min-width:auto;padding:3px 8px;color:rgba(247,251,255,.86);background:rgba(255,255,255,.035)}
.composer{position:fixed;left:0;right:0;bottom:calc(58px + env(safe-area-inset-bottom,0px));z-index:12;padding:7px 8px;border-top:1px solid rgba(104,228,255,.12);background:linear-gradient(180deg,rgba(8,13,20,.74),rgba(4,6,10,.98));backdrop-filter:blur(10px)}
.composer-target{display:none;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px;padding:4px 6px;border-radius:999px;background:rgba(255,228,94,.055);color:rgba(255,245,176,.86);font-size:11px;font-weight:850}
.composer-target.show{display:flex}
.composer-target span{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.composer-target button{min-width:30px;min-height:30px;border:0;border-radius:999px;background:transparent;color:rgba(255,245,176,.88);font-size:15px;font-weight:1000}
.composer-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:6px;align-items:center}
.add-input{min-height:44px;border:1px solid rgba(104,228,255,.18);border-radius:12px;padding:9px 10px;background:rgba(2,7,12,.46);color:var(--text);font-size:16px;outline:none}
.add-input:focus,.item-text:focus,.note:focus{border-color:rgba(56,230,255,.75);outline:2px solid rgba(56,230,255,.12)}
.btn{min-height:42px;border:1px solid rgba(104,228,255,.16);border-radius:12px;padding:7px 10px;background:rgba(16,23,34,.86);color:var(--text);font-size:12px;font-weight:900}
.btn.primary{border-color:rgba(56,230,255,.45);background:rgba(56,230,255,.88);color:#041017}
.btn.danger{border-color:rgba(255,91,109,.34);color:#ffe7eb;background:rgba(255,91,109,.055)}
.btn:active{transform:translateY(1px)}
.card{border:1px solid rgba(104,228,255,.12);border-radius:14px;background:rgba(255,255,255,.025);padding:9px}
.list{display:flex;flex-direction:column;gap:6px;margin-top:7px}
.item{--depth-solid:#38e6ff;--depth-rgb:56,230,255;border:1px solid rgba(104,228,255,.10);border-radius:13px;background:rgba(255,255,255,.022);box-shadow:inset 3px 0 0 rgba(var(--depth-rgb),.44);padding:7px;transition:background .12s ease, outline-color .12s ease, transform .12s ease}
.item.selected{outline:1px solid rgba(var(--depth-rgb),.48);transform:translateY(-1px);background:rgba(var(--depth-rgb),.07)}
.item.flash{animation:flashAdd .58s ease-out}
@keyframes flashAdd{0%{box-shadow:inset 3px 0 0 rgba(var(--depth-rgb),.95),0 0 0 2px rgba(56,230,255,.25)}100%{box-shadow:inset 3px 0 0 rgba(var(--depth-rgb),.44),0 0 0 0 rgba(56,230,255,0)}}
.item.depth-0{--depth-solid:#63d8ff;--depth-rgb:99,216,255}
.item.depth-1{--depth-solid:#ffe45e;--depth-rgb:255,228,94}
.item.depth-2{--depth-solid:#5ff2a9;--depth-rgb:95,242,169}
.item.depth-3{--depth-solid:#b58cff;--depth-rgb:181,140,255}
.item.depth-4{--depth-solid:#ff9ad7;--depth-rgb:255,154,215}
.item.depth-5{--depth-solid:#ffb35e;--depth-rgb:255,179,94}
.item.depth-6{--depth-solid:#ff7b89;--depth-rgb:255,123,137}
.item-row{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:8px;align-items:center}
.outline-main{display:grid;grid-template-columns:auto minmax(0,1fr);gap:8px}
.node-wrap{min-width:0;display:grid;grid-template-columns:var(--indent,0px) minmax(0,1fr);align-items:stretch}
.branch{position:relative;min-height:100%}
.branch.has-depth::before{content:"";position:absolute;left:calc(100% - 10px);top:6px;bottom:6px;width:2px;border-radius:999px;background:rgba(var(--depth-rgb),.34)}
.text-cell{min-width:0}
.meta-row{display:flex;align-items:center;gap:6px;min-height:14px;margin-top:0}
.check{width:24px;height:24px;accent-color:var(--cyan)}
.item-text{width:100%;min-height:34px;border:0;background:transparent;color:var(--text);font-size:16px;font-weight:760;outline:none}
.note{width:100%;margin-top:0;min-height:24px;border:0;background:transparent;color:rgba(159,176,196,.74);font-size:16px;line-height:1.32;outline:none}
.note::placeholder{color:rgba(159,176,196,.34)}
.note:not(:placeholder-shown){color:var(--sub)}
.actions{display:none;gap:4px;align-items:center}
.item.selected .actions{display:flex}
.outline-actions{display:none;grid-template-columns:repeat(5,1fr);gap:5px;margin-top:6px}
.item.selected .outline-actions{display:grid}
.mini{position:relative;min-width:32px;min-height:32px;padding:3px 6px;border-radius:9px;font-size:11px}
.mini::after{content:"";position:absolute;inset:-6px;border-radius:14px}
.bulk{display:none;position:sticky;top:0;z-index:2;margin-bottom:7px;border:1px solid rgba(56,230,255,.16);border-radius:12px;background:rgba(8,21,29,.90);padding:6px;align-items:center;justify-content:space-between;gap:8px}
.bulk.show{display:flex}
.bulk-count{font-size:11px;font-weight:850;color:rgba(239,252,255,.82)}
.bulk-actions{display:flex;gap:5px}
.undo-strip{display:none;margin:0 0 7px;padding:6px 7px;border-radius:12px;background:rgba(255,255,255,.035);align-items:center;justify-content:space-between;gap:8px}
.undo-strip.show{display:flex}
.undo-strip span{color:rgba(159,176,196,.84);font-size:11px;font-weight:850}
.handoff{margin-top:8px}
.preview{display:none;margin-top:9px;white-space:pre-wrap;max-height:220px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:#d6dee8;font-size:11px;line-height:1.5}
.bottom{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:7px 8px calc(7px + env(safe-area-inset-bottom,0px));border-top:1px solid rgba(104,228,255,.12);background:linear-gradient(180deg,rgba(8,13,20,.80),rgba(4,6,10,.98))}
.bottom button{min-height:44px;border:1px solid rgba(104,228,255,.16);border-radius:14px;background:rgba(16,23,34,.82);color:var(--sub);font-size:12px;font-weight:900}
.bottom button span{display:block;pointer-events:none;line-height:1.05}
.bottom button.active{border-color:rgba(255,228,94,.48);background:rgba(255,228,94,.90);color:#101000}
.empty{text-align:center;color:rgba(159,176,196,.70);font-size:12px;line-height:1.6;margin:20px 4px}
@media (max-width:360px){.outline-actions{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <input id="title" class="title" value="今日のメモ" autocomplete="off">
  </header>
  <main id="main" class="main"></main>
  <div id="composer" class="composer">
    <div id="composerTarget" class="composer-target"></div>
    <div class="composer-row">
      <input id="add" class="add-input" placeholder="思いついたことを書く" autocomplete="off">
      <button class="btn primary" data-act="add-smart">追加</button>
    </div>
  </div>
  <nav class="bottom">
    <button data-mode="inbox" class="active"><span>書く</span></button>
    <button data-mode="outline"><span>整える</span></button>
    <button data-mode="send"><span>渡す</span></button>
  </nav>
</div>
<script>
(function(){
  'use strict';
  const KEY='mmm.pocket.lite.v1';
  let timer=0;
  let undoBuffer=null;
  let flashId=null;
  let resetArmed=false;
  let previewOpen=false;
  let state=load();

  function fresh(){return {version:1,title:'今日のメモ',mode:'inbox',selected:[],items:[],updatedAt:Date.now()}}
  function uid(){return 'p_'+Math.random().toString(36).slice(2,8)+Date.now().toString(36).slice(-4)}
  function load(){
    try{
      const raw=localStorage.getItem(KEY);
      if(!raw) return fresh();
      const s={...fresh(),...JSON.parse(raw)};
      s.items=Array.isArray(s.items)?s.items:[];
      s.selected=Array.isArray(s.selected)?s.selected:[];
      if(!['inbox','outline','send'].includes(s.mode)) s.mode='inbox';
      return s;
    }catch(e){return fresh()}
  }
  function save(){clearTimeout(timer);timer=setTimeout(()=>localStorage.setItem(KEY,JSON.stringify({...state,updatedAt:Date.now()})),80)}
  function esc(v){return String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
  function pulseButton(btn,label){
    if(!btn) return;
    const original=btn.textContent;
    btn.textContent=label;
    btn.disabled=true;
    setTimeout(()=>{btn.textContent=original;btn.disabled=false},720);
  }
  function snapshot(){return {title:state.title,mode:state.mode,selected:[...state.selected],items:state.items.map(i=>({...i}))}}
  function restoreUndo(){if(!undoBuffer) return; state={...state,...undoBuffer}; undoBuffer=null; reindex(); save(); render()}
  function selectedSet(){return new Set(state.selected.filter(id=>state.items.some(i=>i.id===id)))}
  function item(id){return state.items.find(i=>i.id===id)}
  function reindex(){state.items.forEach((i,idx)=>i.order=idx+1); state.selected=[...selectedSet()]}
  function singleSelectedId(){const ids=[...selectedSet()]; return ids.length===1?ids[0]:null}
  function childInsertIndex(parentId){
    const pi=state.items.findIndex(x=>x.id===parentId);
    if(pi<0) return -1;
    const parentDepth=state.items[pi].depth;
    let n=pi+1;
    while(n<state.items.length && state.items[n].depth>parentDepth) n++;
    return n;
  }
  function add(text,parentId=null){
    const t=String(text||'').trim();
    if(!t) return null;
    const parent=parentId?item(parentId):null;
    const next={id:uid(),text:t,note:'',depth:parent?Math.min(6,parent.depth+1):0,status:'none',order:1,createdAt:Date.now()};
    if(parent){
      const at=childInsertIndex(parent.id);
      state.items.splice(at<0?state.items.length:at,0,next);
      state.selected=[parent.id];
    }else{
      state.items.unshift(next);
      state.selected=[next.id];
    }
    flashId=next.id;
    reindex(); save(); render();
    setTimeout(()=>{if(flashId===next.id){flashId=null;render()}},640);
    setTimeout(()=>document.getElementById('add')?.focus(),30);
    return next;
  }
  function addFromComposer(){
    const input=document.getElementById('add');
    const added=add(input?.value||'',singleSelectedId()||null);
    if(added && input) input.value='';
  }
  function del(id){
    if(!item(id)) return;
    undoBuffer=snapshot();
    state.items=state.items.filter(i=>i.id!==id);
    reindex(); save(); render();
  }
  function move(id,d){
    const i=state.items.findIndex(x=>x.id===id), n=i+d;
    if(i<0||n<0||n>=state.items.length) return;
    const [it]=state.items.splice(i,1); state.items.splice(n,0,it); reindex(); save(); render();
  }
  function depth(id,d){
    const i=state.items.findIndex(x=>x.id===id); if(i<0) return;
    const prev=state.items[i-1]; const max=prev?prev.depth+1:0;
    state.items[i].depth=Math.max(0,Math.min(6,state.items[i].depth+d,max)); save(); render();
  }
  function toggle(id,checked){const set=selectedSet(); checked?set.add(id):set.delete(id); state.selected=[...set]; save(); render()}
  function bundle(){
    const set=selectedSet(); const sel=state.items.filter(i=>set.has(i.id));
    if(sel.length<2) return;
    undoBuffer=snapshot();
    const first=Math.min(...sel.map(i=>state.items.findIndex(x=>x.id===i.id)));
    const parentDepth=Math.min(...sel.map(i=>i.depth));
    const ids=new Set(sel.map(i=>i.id));
    const parent={id:uid(),text:'まとまり',note:'',depth:parentDepth,status:'none',order:1,createdAt:Date.now()};
    const before=[],after=[];
    state.items.forEach((it,idx)=>{ if(ids.has(it.id)) return; (idx<first?before:after).push(it); });
    const children=sel.map(i=>({...i,depth:Math.min(6,parentDepth+1)}));
    state.items=[...before,parent,...children,...after]; state.selected=[parent.id]; reindex(); save(); render();
  }
  function selectAll(){
    if(!state.items.length) return;
    state.selected=state.items.map(i=>i.id);
    save(); render();
  }
  function deleteSelected(){
    const set=selectedSet(); if(!set.size) return;
    undoBuffer=snapshot();
    state.items=state.items.filter(i=>!set.has(i.id));
    state.selected=[]; reindex(); save(); render();
  }
  function stats(){return {total:state.items.length}}
  function bulk(){
    const c=selectedSet().size;
    return `<div class="bulk ${c?'show':''}"><div class="bulk-count">${c}件</div><div class="bulk-actions"><button class="btn mini primary" data-act="bundle">束ねる</button><button class="btn mini danger" data-act="delete-selected">削除</button><button class="btn mini" data-act="clear-selected">解除</button></div></div>`;
  }
  function undoStrip(){return `<div class="undo-strip ${undoBuffer?'show':''}"><span>削除済み</span><button class="btn mini" data-act="undo">元に戻す</button></div>`}
  function updateComposer(){
    const target=document.getElementById('composerTarget');
    const input=document.getElementById('add');
    const id=singleSelectedId();
    const p=id?item(id):null;
    if(target){
      target.classList.toggle('show',!!p);
      target.innerHTML=p?`<span>${esc(p.text||'選択中のメモ')} の下に追加</span><button data-act="clear-selected" aria-label="選択解除">×</button>`:'';
    }
    if(input){input.placeholder=p?`「${p.text||'選択中のメモ'}」の下に追加`:'思いついたことを書く'}
  }
  function render(){
    document.getElementById('title').value=state.title;
    document.querySelectorAll('.bottom button').forEach(b=>b.classList.toggle('active',b.dataset.mode===state.mode));
    const main=document.getElementById('main');
    if(state.mode==='inbox') main.innerHTML=inbox();
    else if(state.mode==='outline') main.innerHTML=outline();
    else main.innerHTML=send();
    updateComposer();
  }
  function head(title){const s=stats(); const canSelect=(state.mode==='inbox'||state.mode==='outline')&&s.total>0; const selectBtn=canSelect?`<button class="btn mini head-select" data-act="select-all">全選択</button>`:''; return `<div class="mode-head"><div class="mode-title">${title}</div><div class="mode-meta"><div class="mode-count">${s.total}件</div>${selectBtn}</div></div>`}
  function inbox(){return `${head('書く')}${undoStrip()}${bulk()}<div class="list">${state.items.length?state.items.map(inboxItem).join(''):'<div class="empty">まだメモがありません。</div>'}</div>`}
  function hierarchyInputs(i){
    const ind=Math.min(112,i.depth*18);
    return `<div class="node-wrap" style="--indent:${ind}px"><span class="branch ${i.depth?'has-depth':''}"></span><div class="text-cell"><input class="item-text" data-text="${i.id}" value="${esc(i.text)}"><div class="meta-row"><input class="note" data-note="${i.id}" value="${esc(i.note)}" placeholder="補足"></div></div></div>`;
  }
  function inboxItem(i){
    const sel=selectedSet().has(i.id);
    return `<article class="item depth-${Math.min(6,i.depth)} ${sel?'selected':''} ${i.id===flashId?'flash':''}"><div class="item-row"><input class="check" type="checkbox" data-sel="${i.id}" ${sel?'checked':''}>${hierarchyInputs(i)}<div class="actions"><button class="btn mini danger" data-del="${i.id}">削除</button></div></div></article>`;
  }
  function outline(){return `${head('整える')}${undoStrip()}${bulk()}<div class="list">${state.items.length?state.items.map(outlineItem).join(''):'<div class="empty">メモがありません。</div>'}</div>`}
  function outlineItem(i){
    const sel=selectedSet().has(i.id);
    return `<article class="item depth-${Math.min(6,i.depth)} ${sel?'selected':''} ${i.id===flashId?'flash':''}"><div class="outline-main"><input class="check" type="checkbox" data-sel="${i.id}" ${sel?'checked':''}><div>${hierarchyInputs(i)}<div class="outline-actions"><button class="btn mini" data-up="${i.id}">↑</button><button class="btn mini" data-down="${i.id}">↓</button><button class="btn mini" data-out="${i.id}">←</button><button class="btn mini" data-in="${i.id}">→</button><button class="btn mini danger" data-del="${i.id}">削除</button></div></div></div></article>`;
  }
  function toText(){return state.title+'\n'+state.items.map(i=>'  '.repeat(i.depth)+'- '+i.text+(i.note?'\n'+'  '.repeat(i.depth+1)+'補足: '+i.note:'')).join('\n')}
  function send(){
    const data=toMMM();
    const payload=JSON.stringify(data);
    return `${head('渡す')}<div class="card"><div class="mode-count" style="margin-bottom:8px">${data.nodes.length}ノード / ${payload.length}文字</div><div class="handoff"><button class="btn primary" style="width:100%" data-act="copy-json">MMM JSONコピー</button></div><div class="handoff"><button class="btn primary" style="width:100%" data-act="copy-text">テキストコピー</button></div><div class="handoff"><button class="btn" style="width:100%" data-act="save-json">保存</button></div><div class="handoff"><button class="btn" style="width:100%" data-act="toggle-preview">プレビュー</button></div><div class="handoff"><button class="btn danger" style="width:100%" data-act="reset-all">${resetArmed?'もう一度タップ':'全削除'}</button></div><pre class="preview" style="display:${previewOpen?'block':'none'}">${esc(toText())}</pre></div>`;
  }
  function toMMM(){
    const root={id:'pocket_root',label:state.title||'Pocket',subtext:'Pocket Liteから変換',status:'none',collapsed:false,fitMode:'shrink',order:1,x:0,y:0};
    const nodes=[root], edges=[], stack=[{depth:-1,node:root}];
    state.items.forEach((it,idx)=>{
      const n={id:'pocket_'+it.id,label:it.text||'無題',subtext:it.note||'',status:it.status||'none',collapsed:false,fitMode:'shrink',order:idx+2,x:0,y:0};
      while(stack.length&&stack[stack.length-1].depth>=it.depth) stack.pop();
      const p=stack[stack.length-1]?.node||root;
      nodes.push(n); edges.push({id:'pocket_e_'+idx,from:p.id,to:n.id,label:''}); stack.push({depth:it.depth,node:n});
    });
    return {schemaVersion:'1.0',meta:{title:state.title||'Pocket',layoutMode:'horizontal',hideDone:false,focusMode:false,focusNodeId:null,presentationMode:false,coloringMode:'manual'},nodes,edges};
  }
  async function copy(text,btn){try{await navigator.clipboard.writeText(text);pulseButton(btn,'コピー済')}catch(e){pulseButton(btn,'失敗')}}
  function saveFile(text,filename,type='application/json',btn=null){
    try{const blob=new Blob([text],{type});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();setTimeout(()=>URL.revokeObjectURL(url),500);pulseButton(btn,'保存済')}
    catch(e){pulseButton(btn,'失敗')}
  }
  document.addEventListener('click',e=>{
    const t=e.target;
    if(t.dataset.mode){state.mode=t.dataset.mode;save();render();return}
    if(t.dataset.act==='add-smart'){addFromComposer();return}
    if(t.dataset.act==='bundle'){bundle();return}
    if(t.dataset.act==='select-all'){selectAll();return}
    if(t.dataset.act==='delete-selected'){deleteSelected();return}
    if(t.dataset.act==='undo'){restoreUndo();return}
    if(t.dataset.act==='clear-selected'){state.selected=[];save();render();return}
    if(t.dataset.act==='copy-json'){copy(JSON.stringify(toMMM(),null,2),t);return}
    if(t.dataset.act==='copy-text'){copy(toText(),t);return}
    if(t.dataset.act==='save-json'){saveFile(JSON.stringify(toMMM(),null,2),'mmm-pocket-lite-map.json','application/json',t);return}
    if(t.dataset.act==='toggle-preview'){previewOpen=!previewOpen;render();return}
    if(t.dataset.act==='reset-all'){
      if(!resetArmed){resetArmed=true;render();setTimeout(()=>{resetArmed=false;render()},1800);return}
      state=fresh();localStorage.removeItem(KEY);resetArmed=false;undoBuffer=null;save();render();return
    }
    if(t.dataset.del){del(t.dataset.del);return}
    if(t.dataset.up){move(t.dataset.up,-1);return}
    if(t.dataset.down){move(t.dataset.down,1);return}
    if(t.dataset.in){depth(t.dataset.in,1);return}
    if(t.dataset.out){depth(t.dataset.out,-1);return}
  },{passive:true});
  document.addEventListener('change',e=>{if(e.target.dataset.sel) toggle(e.target.dataset.sel,e.target.checked)},{passive:true});
  document.addEventListener('input',e=>{
    const t=e.target;
    if(t.id==='title'){state.title=t.value;save();return}
    if(t.dataset.text){const i=item(t.dataset.text); if(i){i.text=t.value;save()};return}
    if(t.dataset.note){const i=item(t.dataset.note); if(i){i.note=t.value;save()};return}
  },{passive:true});
  document.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.id==='add'){e.preventDefault();addFromComposer()}});
  render();
})();
</script>
</body>
</html>
