<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MMM Pocket Lite</title>
<style>
/*
  MMM Pocket Lite
  ----------------
  スマホで入力できないほど重い問題への回答。
  ここではMMM本体・SVGキャンバス・旧Overlay・監視系パッチを読み込まない。
  役割は「発散 → 階層化 → MMM JSONに渡す」だけ。

  メタファー:
  - Pocket Lite = 軽量Training Mode
  - Inbox = ENTRY
  - Outline = COMMAND LIST
  - Send = BATTLE SETTINGS
*/
:root{
  --bg:#060910;
  --panel:#101722;
  --panel2:#151e2b;
  --line:rgba(104,228,255,.22);
  --cyan:#38e6ff;
  --yellow:#ffe45e;
  --text:#f7fbff;
  --sub:#9fb0c4;
  --danger:#ff5b6d;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",system-ui,sans-serif}
body{overflow:hidden}
button,input,textarea{font:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
button{cursor:pointer}
.app{
  height:100dvh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  background:
    radial-gradient(circle at 16% -8%, rgba(56,230,255,.18), transparent 30%),
    linear-gradient(180deg,#08111b,#05070b);
}
.header{
  padding:10px 10px 8px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg,rgba(16,23,34,.98),rgba(7,10,16,.96));
}
.kicker{font-size:10px;font-weight:900;letter-spacing:.12em;color:var(--cyan)}
.title{
  margin-top:5px;
  width:100%;
  min-height:38px;
  border:1px solid var(--line);
  border-radius:11px;
  padding:7px 9px;
  background:rgba(2,7,12,.42);
  color:var(--text);
  font-size:16px;
  font-weight:900;
  outline:none;
}
.main{
  min-height:0;
  overflow:auto;
  -webkit-overflow-scrolling:touch;
  padding:10px 10px 92px;
}
.mode-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;margin-bottom:10px}
.mode-title{font-size:18px;font-weight:1000;line-height:1.2}
.mode-sub{margin-top:3px;color:var(--sub);font-size:11px;line-height:1.45}
.card{
  border:1px solid var(--line);
  border-radius:14px;
  background:linear-gradient(180deg,rgba(21,30,43,.92),rgba(10,14,21,.92));
  padding:9px;
}
.add-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:7px}
.add-input{
  min-height:44px;
  border:1px solid var(--line);
  border-radius:12px;
  padding:9px 10px;
  background:rgba(2,7,12,.46);
  color:var(--text);
  font-size:16px;
  outline:none;
}
.add-input:focus,.item-text:focus,.title:focus{
  border-color:rgba(56,230,255,.75);
  outline:2px solid rgba(56,230,255,.12);
}
.btn{
  min-height:42px;
  border:1px solid var(--line);
  border-radius:12px;
  padding:7px 10px;
  background:linear-gradient(180deg,rgba(29,42,58,.98),rgba(9,13,19,.98));
  color:var(--text);
  font-size:12px;
  font-weight:900;
}
.btn.primary{border-color:rgba(56,230,255,.62);background:linear-gradient(180deg,#7df2ff,var(--cyan));color:#041017}
.btn.warn{border-color:rgba(255,228,94,.5);color:#fff5b0}
.btn.danger{border-color:rgba(255,91,109,.5);color:#ffe7eb}
.btn:active{transform:translateY(1px)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin:10px 0}
.stat{border:1px solid rgba(104,228,255,.16);border-radius:13px;background:rgba(255,255,255,.035);padding:8px}
.stat strong{display:block;font-size:17px;line-height:1}
.stat span{display:block;margin-top:4px;color:var(--sub);font-size:10px}
.list{display:flex;flex-direction:column;gap:7px;margin-top:10px}
.item{
  border:1px solid rgba(104,228,255,.18);
  border-radius:14px;
  background:rgba(255,255,255,.035);
  padding:7px;
}
.item.selected{outline:1px solid rgba(56,230,255,.5);background:rgba(56,230,255,.08)}
.item-row{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:8px;align-items:center}
.check{width:24px;height:24px;accent-color:var(--cyan)}
.item-text{
  width:100%;
  min-height:36px;
  border:0;
  background:transparent;
  color:var(--text);
  font-size:15px;
  font-weight:760;
  outline:none;
}
.note{
  width:100%;
  margin-top:2px;
  border:0;
  background:transparent;
  color:var(--sub);
  font-size:11px;
  outline:none;
}
.actions{display:flex;gap:4px}
.mini{min-width:32px;min-height:32px;padding:3px 6px;border-radius:9px;font-size:11px}
.outline-main{display:grid;grid-template-columns:auto minmax(0,1fr);gap:8px}
.indent{width:var(--indent,0px)}
.outline-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:6px}
.bulk{
  display:none;
  position:sticky;
  top:0;
  z-index:2;
  margin-bottom:9px;
  border:1px solid rgba(56,230,255,.35);
  border-radius:13px;
  background:rgba(8,21,29,.96);
  padding:8px;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}
.bulk.show{display:flex}
.bulk-count{font-size:12px;font-weight:900;color:#effcff}
.bulk-actions{display:flex;gap:5px}
.preview{
  margin-top:10px;
  white-space:pre-wrap;
  max-height:260px;
  overflow:auto;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
  color:#d6dee8;
  font-size:11px;
  line-height:1.5;
}
.handoff{
  margin-top:10px;
  border:1px solid rgba(255,228,94,.30);
  border-radius:14px;
  background:rgba(255,228,94,.06);
  padding:9px;
}
.handoff-title{color:#fff5b0;font-size:12px;font-weight:900}
.handoff-steps{margin:6px 0 0;padding-left:18px;color:#d6dee8;font-size:11px;line-height:1.55}
.bottom{
  position:fixed;
  left:0;right:0;bottom:0;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:6px;
  padding:8px 8px calc(8px + env(safe-area-inset-bottom,0px));
  border-top:1px solid var(--line);
  background:linear-gradient(180deg,rgba(8,13,20,.84),rgba(4,6,10,.98));
}
.bottom button{
  min-height:44px;
  border:1px solid rgba(104,228,255,.2);
  border-radius:14px;
  background:rgba(16,23,34,.9);
  color:var(--sub);
  font-size:12px;
  font-weight:900;
}
.bottom button.active{border-color:rgba(255,228,94,.65);background:linear-gradient(180deg,#fff28a,var(--yellow));color:#101000}
.toast{
  position:fixed;
  left:12px;right:12px;bottom:82px;
  display:none;
  z-index:20;
  padding:10px;
  border:1px solid var(--line);
  border-radius:14px;
  background:rgba(7,10,16,.96);
  color:var(--text);
  text-align:center;
  font-size:12px;
  font-weight:800;
}
.toast.show{display:block}
.empty{text-align:center;color:var(--sub);font-size:12px;line-height:1.6;margin:20px 4px}
@media (max-width:360px){
  .outline-actions{grid-template-columns:repeat(2,1fr)}
  .stats{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="kicker">MMM POCKET LITE / TRAINING MODE</div>
    <input id="title" class="title" value="今日のメモ" autocomplete="off">
  </header>
  <main id="main" class="main"></main>
  <nav class="bottom">
    <button data-mode="inbox" class="active">Inbox</button>
    <button data-mode="outline">Outline</button>
    <button data-mode="send">Send</button>
  </nav>
</div>
<div id="toast" class="toast"></div>
<script>
(function(){
  'use strict';
  const KEY='mmm.pocket.lite.v1';
  let timer=0, toastTimer=0;
  let state=load();

  function fresh(){
    return {version:1,title:'今日のメモ',mode:'inbox',selected:[],items:[],updatedAt:Date.now()};
  }
  function uid(){return 'p_'+Math.random().toString(36).slice(2,8)+Date.now().toString(36).slice(-4)}
  function load(){
    try{
      const raw=localStorage.getItem(KEY);
      if(!raw) return fresh();
      const s={...fresh(),...JSON.parse(raw)};
      s.items=Array.isArray(s.items)?s.items:[];
      s.selected=Array.isArray(s.selected)?s.selected:[];
      if(!['inbox','outline','send'].includes(s.mode)) s.mode='inbox';
      return s;
    }catch(e){return fresh()}
  }
  function save(){
    clearTimeout(timer);
    timer=setTimeout(()=>localStorage.setItem(KEY,JSON.stringify({...state,updatedAt:Date.now()})),80);
  }
  function esc(v){return String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
  function toast(msg){
    const el=document.getElementById('toast');
    el.textContent=msg; el.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),1300);
  }
  function selectedSet(){return new Set(state.selected.filter(id=>state.items.some(i=>i.id===id)))}
  function item(id){return state.items.find(i=>i.id===id)}
  function reindex(){state.items.forEach((i,idx)=>i.order=idx+1); state.selected=[...selectedSet()]}
  function add(text){
    const t=String(text||'').trim();
    if(!t) return;
    state.items.unshift({id:uid(),text:t,note:'',depth:0,status:'none',order:1,createdAt:Date.now()});
    reindex(); save(); render(); toast('ADD');
    setTimeout(()=>document.getElementById('add')?.focus(),30);
  }
  function del(id){state.items=state.items.filter(i=>i.id!==id); reindex(); save(); render()}
  function move(id,d){
    const i=state.items.findIndex(x=>x.id===id), n=i+d;
    if(i<0||n<0||n>=state.items.length) return;
    const [it]=state.items.splice(i,1); state.items.splice(n,0,it); reindex(); save(); render();
  }
  function depth(id,d){
    const i=state.items.findIndex(x=>x.id===id); if(i<0) return;
    const prev=state.items[i-1]; const max=prev?prev.depth+1:0;
    state.items[i].depth=Math.max(0,Math.min(6,state.items[i].depth+d,max)); save(); render();
  }
  function toggle(id,checked){
    const set=selectedSet(); checked?set.add(id):set.delete(id); state.selected=[...set]; save(); render();
  }
  function bundle(){
    const set=selectedSet(); const sel=state.items.filter(i=>set.has(i.id));
    if(sel.length<2){toast('2件以上選んで');return}
    const title=prompt('選んだメモを、ひとことで言うと？','新しいまとまり');
    if(!title) return;
    const first=Math.min(...sel.map(i=>state.items.findIndex(x=>x.id===i.id)));
    const parentDepth=Math.min(...sel.map(i=>i.depth));
    const ids=new Set(sel.map(i=>i.id));
    const parent={id:uid(),text:title.trim(),note:'',depth:parentDepth,status:'none',order:1,createdAt:Date.now()};
    const before=[],after=[];
    state.items.forEach((it,idx)=>{ if(ids.has(it.id)) return; (idx<first?before:after).push(it); });
    const children=sel.map(i=>({...i,depth:Math.min(6,parentDepth+1)}));
    state.items=[...before,parent,...children,...after]; state.selected=[parent.id]; reindex(); save(); render(); toast('BUNDLE');
  }
  function stats(){
    const structured=state.items.filter(i=>i.depth>0).length;
    const actions=state.items.filter(i=>/する|確認|作成|依頼|送る|直す|決める|調整|共有|TODO|ToDo/i.test(i.text+' '+i.note)).length;
    return {total:state.items.length,structured,actions};
  }
  function bulk(){
    const c=selectedSet().size;
    return `<div class="bulk ${c?'show':''}"><div class="bulk-count">${c}件選択中</div><div class="bulk-actions"><button class="btn mini primary" data-act="bundle">束ねる</button><button class="btn mini" data-act="clear">解除</button></div></div>`;
  }
  function render(){
    document.getElementById('title').value=state.title;
    document.querySelectorAll('.bottom button').forEach(b=>b.classList.toggle('active',b.dataset.mode===state.mode));
    const main=document.getElementById('main');
    if(state.mode==='inbox') main.innerHTML=inbox();
    else if(state.mode==='outline') main.innerHTML=outline();
    else main.innerHTML=send();
  }
  function head(title,sub){
    const s=stats();
    return `<div class="mode-head"><div><div class="mode-title">${title}</div><div class="mode-sub">${sub}</div></div></div>
    <div class="stats"><div class="stat"><strong>${s.total}</strong><span>メモ</span></div><div class="stat"><strong>${s.structured}</strong><span>構造化</span></div><div class="stat"><strong>${s.actions}</strong><span>次ACTION</span></div></div>`;
  }
  function inbox(){
    return `${head('ENTRY / Inbox','まず出す。軽く書く。')}
    <div class="card"><div class="add-row"><input id="add" class="add-input" placeholder="思いついたことを書く..." autocomplete="off"><button class="btn primary" data-act="add">追加</button></div></div>
    ${bulk()}<div class="list">${state.items.length?state.items.map(inboxItem).join(''):'<div class="empty">まだメモがありません。</div>'}</div>`;
  }
  function inboxItem(i){
    const sel=selectedSet().has(i.id);
    return `<article class="item ${sel?'selected':''}">
      <div class="item-row"><input class="check" type="checkbox" data-sel="${i.id}" ${sel?'checked':''}><div><input class="item-text" data-text="${i.id}" value="${esc(i.text)}"><input class="note" data-note="${i.id}" value="${esc(i.note)}" placeholder="補足"></div><button class="btn mini danger" data-del="${i.id}">削除</button></div>
    </article>`;
  }
  function outline(){
    return `${head('COMMAND LIST / Outline','↑↓で順番、←→で階層。')}
    ${bulk()}<div class="list">${state.items.length?state.items.map(outlineItem).join(''):'<div class="empty">Inboxでメモを追加。</div>'}</div>`;
  }
  function outlineItem(i){
    const sel=selectedSet().has(i.id), ind=Math.min(96,i.depth*18);
    return `<article class="item ${sel?'selected':''}">
      <div class="outline-main"><input class="check" type="checkbox" data-sel="${i.id}" ${sel?'checked':''}><div>
        <div style="display:grid;grid-template-columns:${ind}px minmax(0,1fr)"><span></span><input class="item-text" data-text="${i.id}" value="${esc(i.text)}"></div>
        <div class="outline-actions"><button class="btn mini" data-up="${i.id}">↑</button><button class="btn mini" data-down="${i.id}">↓</button><button class="btn mini" data-out="${i.id}">←</button><button class="btn mini" data-in="${i.id}">→</button></div>
      </div></div>
    </article>`;
  }
  function preview(){
    return state.title+'\\n'+state.items.map(i=>'  '.repeat(i.depth)+'- '+i.text+(i.note?' / '+i.note:'')).join('\\n');
  }
  function send(){
    const data=toMMM();
    const payload=JSON.stringify(data);
    return `${head('BATTLE SETTINGS / Send','MMMへ渡す前の確認。')}
    <div class="card"><div class="stats"><div class="stat"><strong>${data.nodes.length}</strong><span>ノード</span></div><div class="stat"><strong>${data.edges.length}</strong><span>線</span></div><div class="stat"><strong>${payload.length}</strong><span>JSON文字</span></div></div>
    <div class="handoff">
      <div class="handoff-title">PC版MMMへ渡す</div>
      <ol class="handoff-steps"><li>「MMM JSONコピー」または「JSON保存」</li><li>PC版MMMで「Pocket Lite取込」</li><li>貼り付け/ファイル選択して読み込み</li></ol>
    </div>
    <div class="add-row" style="margin-top:8px"><button class="btn primary" data-act="copy-json">MMM JSONコピー</button><button class="btn" data-act="save-json">JSON保存</button></div>
    <div class="add-row" style="margin-top:7px"><button class="btn" data-act="copy-pocket">Pocket保存JSON</button><button class="btn warn" data-act="clear">初期化</button></div>
    <pre class="preview">${esc(preview())}</pre></div>`;
  }
  function toMMM(){
    const root={id:'pocket_root',label:state.title||'Pocket',subtext:'Pocket Liteから変換',status:'none',collapsed:false,fitMode:'shrink',order:1,x:0,y:0};
    const nodes=[root], edges=[], stack=[{depth:-1,node:root}];
    state.items.forEach((it,idx)=>{
      const n={id:'pocket_'+it.id,label:it.text||'無題',subtext:it.note||'',status:it.status||'none',collapsed:false,fitMode:'shrink',order:idx+2,x:0,y:0};
      while(stack.length&&stack[stack.length-1].depth>=it.depth) stack.pop();
      const p=stack[stack.length-1]?.node||root;
      nodes.push(n); edges.push({id:'pocket_e_'+idx,from:p.id,to:n.id,label:''}); stack.push({depth:it.depth,node:n});
    });
    return {schemaVersion:'1.0',meta:{title:state.title||'Pocket',layoutMode:'horizontal',hideDone:false,focusMode:false,focusNodeId:null,presentationMode:false,coloringMode:'manual'},nodes,edges};
  }
  async function copy(text,msg){
    try{await navigator.clipboard.writeText(text);toast(msg||'コピーしました')}catch(e){toast('コピー失敗')}
  }
  function saveFile(text,filename){
    try{
      const blob=new Blob([text],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url; a.download=filename; a.click();
      setTimeout(()=>URL.revokeObjectURL(url),500);
      toast('JSON保存');
    }catch(e){toast('保存失敗')}
  }
  document.addEventListener('click',e=>{
    const t=e.target;
    if(t.dataset.mode){state.mode=t.dataset.mode;save();render();return}
    if(t.dataset.act==='add'){add(document.getElementById('add')?.value);return}
    if(t.dataset.act==='bundle'){bundle();return}
    if(t.dataset.act==='clear'){state.selected=[];save();render();return}
    if(t.dataset.act==='copy-json'){copy(JSON.stringify(toMMM(),null,2),'MMM JSONコピー');return}
    if(t.dataset.act==='save-json'){saveFile(JSON.stringify(toMMM(),null,2),'mmm-pocket-lite-map.json');return}
    if(t.dataset.act==='copy-pocket'){copy(JSON.stringify(state,null,2),'Pocket JSONコピー');return}
    if(t.dataset.act==='clear'){if(confirm('Pocket Liteを初期化しますか？')){state=fresh();save();render();toast('初期化')}}
    if(t.dataset.del){del(t.dataset.del);return}
    if(t.dataset.up){move(t.dataset.up,-1);return}
    if(t.dataset.down){move(t.dataset.down,1);return}
    if(t.dataset.in){depth(t.dataset.in,1);return}
    if(t.dataset.out){depth(t.dataset.out,-1);return}
  },{passive:true});
  document.addEventListener('change',e=>{if(e.target.dataset.sel) toggle(e.target.dataset.sel,e.target.checked)},{passive:true});
  document.addEventListener('input',e=>{
    const t=e.target;
    if(t.id==='title'){state.title=t.value;save();return}
    if(t.dataset.text){const i=item(t.dataset.text); if(i){i.text=t.value;save()};return}
    if(t.dataset.note){const i=item(t.dataset.note); if(i){i.note=t.value;save()};return}
  },{passive:true});
  document.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.target.id==='add'){e.preventDefault();add(e.target.value);e.target.value=''}});
  render();
})();
</script>
</body>
</html>
